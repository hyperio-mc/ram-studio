<script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F1EB; font-family: 'Inter', sans-serif; min-height: 100vh; }
    .viewer-header {
      background: rgba(245,241,235,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(26,23,20,0.12);
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .viewer-brand { font-size: 14px; font-weight: 700; }
    .viewer-tag { font-size: 12px; color: rgba(26,23,20,0.5); }
    .viewer-actions { display: flex; gap: 10px; }
    .viewer-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      background: #C04B2C; color: #fff; border: none; font-weight: 600;
      text-decoration: none;
    }
    .viewer-btn.ghost {
      background: transparent; color: #1A1714;
      border: 1px solid rgba(26,23,20,0.22);
    }
    .pen-data { display: none; }
    .viewer-body { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    .screen-nav { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
    .nav-pill {
      padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 500;
      background: #fff; border: 1px solid rgba(26,23,20,0.18); cursor: pointer;
      transition: all 0.15s;
    }
    .nav-pill.active {
      background: #C04B2C; color: #fff; border-color: #C04B2C;
    }
    .screen-panel { display: none; animation: fadeIn 0.2s ease; }
    .screen-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .window { background: #fff; border: 1px solid rgba(26,23,20,0.18); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,23,20,0.07); margin-bottom: 24px; }
    .window-bar { background: #E8E3DB; border-bottom: 1px solid rgba(26,23,20,0.12); display: flex; align-items: center; padding: 0 14px; height: 34px; gap: 8px; }
    .dots { display: flex; gap: 6px; }
    .d { width: 12px; height: 12px; border-radius: 50%; }
    .wt { flex: 1; text-align: center; font-size: 12px; color: rgba(26,23,20,0.45); }
    .wbody { padding: 24px; }
    pre { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; color: #4A3F35; background: #EDE9E2; border-radius: 8px; padding: 16px; overflow-x: auto; white-space: pre-wrap; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: rgba(26,23,20,0.6); line-height: 1.65; margin-bottom: 16px; }
    .meta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .meta-pill { background: #EDE9E2; border-radius: 6px; padding: 6px 12px; font-size: 12px; }
    .meta-pill span { font-weight: 600; }
  </style>
</head>
<body>
  <div class="viewer-header">
    <div>
      <div class="viewer-brand">PANE</div>
      <div class="viewer-tag">Prototype Viewer</div>
    </div>
    <div class="viewer-actions">
      <a href="/pane" class="viewer-btn ghost">← Hero</a>
      <a href="/pane-mock" class="viewer-btn">Interactive Mock ☀◑</a>
    </div>
  </div>

  <div class="viewer-body">
    <div class="screen-nav" id="screenNav"></div>
    <div id="screenPanels"></div>
  </div>

  <script>
    const pen = window.EMBEDDED_PEN ? JSON.parse(window.EMBEDDED_PEN) : null;
    if (pen) {
      const nav = document.getElementById('screenNav');
      const panels = document.getElementById('screenPanels');
      pen.screens.forEach((s, i) => {
        const pill = document.createElement('button');
        pill.className = 'nav-pill' + (i===0?' active':'');
        pill.textContent = s.label;
        pill.onclick = () => {
          document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
          document.querySelectorAll('.screen-panel').forEach(p=>p.classList.remove('active'));
          pill.classList.add('active');
          document.getElementById('panel-'+s.id).classList.add('active');
        };
        nav.appendChild(pill);

        const panel = document.createElement('div');
        panel.className = 'screen-panel' + (i===0?' active':'');
        panel.id = 'panel-'+s.id;
        panel.innerHTML = `
          <div class="window">
            <div class="window-bar">
              <div class="dots">
                <div class="d" style="background:#FF6059"></div>
                <div class="d" style="background:#FFBD30"></div>
                <div class="d" style="background:#29C940"></div>
              </div>
              <div class="wt">${s.label} — PANE</div>
            </div>
            <div class="wbody">
              <h2>${s.label}</h2>
              <p>${s.description}</p>
              <div class="meta-row">${(s.components||[]).map(c=>'<div class="meta-pill"><span>'+c.type+'</span></div>').join('')}</div>
              <div style="margin-top:20px"><pre>${JSON.stringify(s.components, null, 2)}</pre></div>
            </div>
          </div>
        `;
        panels.appendChild(panel);
      });
    }
  </script>
</body>
</html>
