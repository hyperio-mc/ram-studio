<script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#06060E;color:#EDE8E0;font-family:'Inter',sans-serif;min-height:100vh}
    .vhdr{background:rgba(6,6,14,0.92);backdrop-filter:blur(16px);border-bottom:1px solid #1C1C3A;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .vbrand{font-size:12px;font-weight:600;letter-spacing:0.2em;color:#EDE8E0}
    .vtag{font-size:11px;color:#585462;margin-top:2px;letter-spacing:0.05em}
    .vacts{display:flex;gap:10px}
    .vbtn{font-size:11px;padding:7px 16px;border-radius:20px;cursor:pointer;background:#8BB8FF;color:#06060E;border:none;font-weight:700;letter-spacing:0.1em;text-decoration:none}
    .vbtn.ghost{background:transparent;color:#A8A39A;border:1px solid #1C1C3A}
    .vbody{max-width:900px;margin:0 auto;padding:40px 24px}
    .snav{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
    .spill{padding:7px 16px;border-radius:20px;font-size:11px;font-weight:500;background:#0D0D1E;border:1px solid #1C1C3A;cursor:pointer;color:#A8A39A;transition:all 0.15s;letter-spacing:0.05em}
    .spill.active{background:#8BB8FF;color:#06060E;border-color:#8BB8FF}
    .spanel{display:none;animation:fi 0.2s ease}
    .spanel.active{display:block}
    @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .scard{background:#0D0D1E;border:1px solid #1C1C3A;border-radius:12px;overflow:hidden;margin-bottom:20px}
    .sbar{background:rgba(6,6,14,0.7);border-bottom:1px solid #1C1C3A;display:flex;align-items:center;padding:0 16px;height:36px;gap:10px}
    .sid{font-size:10px;color:#585462;font-family:monospace;letter-spacing:0.05em}
    .stitle{flex:1;text-align:center;font-size:11px;letter-spacing:0.15em;color:#EDE8E0}
    .sbadge{font-size:9px;background:rgba(139,184,255,0.1);color:#8BB8FF;border:1px solid rgba(139,184,255,0.2);padding:2px 8px;border-radius:3px}
    .swbody{padding:24px}
    pre{font-family:monospace;font-size:11px;line-height:1.7;color:rgba(237,232,224,0.5);background:rgba(6,6,14,0.5);border:1px solid #1C1C3A;border-radius:8px;padding:16px;overflow-x:auto;white-space:pre-wrap}
    h2{font-size:18px;font-weight:200;margin-bottom:6px;letter-spacing:-0.01em}
    .elcount{font-size:12px;color:#585462;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="vhdr">
    <div><div class="vbrand">STILLPOINT</div><div class="vtag">Prototype Viewer · 6 screens</div></div>

  </div>
  <div class="vbody">

    <div id="spnls"></div>
  </div>
  <script>
    const pen = window.EMBEDDED_PEN ? JSON.parse(window.EMBEDDED_PEN) : null;
    if (pen) {
      const nav = document.getElementById('snav');
      const panels = document.getElementById('spnls');
      pen.screens.forEach((s, i) => {
        const pill = document.createElement('button');
        pill.className = 'spill' + (i===0?' active':'');
        pill.textContent = s.name || s.label || ('Screen '+(i+1));
        pill.onclick = () => {
          document.querySelectorAll('.spill').forEach(p=>p.classList.remove('active'));
          document.querySelectorAll('.spanel').forEach(p=>p.classList.remove('active'));
          pill.classList.add('active');
          document.getElementById('sp-'+i).classList.add('active');
        };
        nav.appendChild(pill);
        const panel = document.createElement('div');
        panel.className = 'spanel' + (i===0?' active':'');
        panel.id = 'sp-'+i;
        const name = s.name || s.label || ('Screen '+(i+1));
        const elCount = (s.elements||[]).length;
        panel.innerHTML = `<div class="scard">
          <div class="sbar">
            <span class="sid">S-0${i+1}</span>
            <span class="stitle">STILLPOINT · ${name.toUpperCase()}</span>
            <span class="sbadge">DESIGN</span>
          </div>
          <div class="swbody">
            <h2>${name}</h2>
            <div class="elcount">${elCount} elements</div>
            <pre>${JSON.stringify((s.elements||[]).slice(0,8),null,2)}${elCount>8?'\n... ('+(elCount-8)+' more elements)':''}</pre>
          </div>
        </div>`;
        panels.appendChild(panel);
      });
    }
  </script>
</body>
</html>
