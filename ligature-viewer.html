<script>
const pen = window.EMBEDDED_PEN || null;

function renderScreen(screen) {
  const W = 390, H = 844;
  const parts = [\`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 \${W} \${H}" width="\${W}" height="\${H}">\`];
  parts.push(\`<rect width="\${W}" height="\${H}" fill="\${screen.backgroundColor || '#FAF8F5'}"/>\`);

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  const fontW = {bold:'700',semibold:'600',medium:'500',regular:'400'};

  for (const el of (screen.elements || [])) {
    if (el.type === 'rectangle') {
      const fill = (el.fill && !el.fill.startsWith('linear')) ? esc(el.fill) : 'none';
      const rx   = el.cornerRadius || 0;
      parts.push(\`<rect x="\${el.x}" y="\${el.y}" width="\${el.width}" height="\${el.height}" rx="\${rx}" fill="\${fill}"/>\`);
    } else if (el.type === 'ellipse') {
      const cx = el.x + el.width/2, cy = el.y + el.height/2;
      const rx = el.width/2, ry = el.height/2;
      parts.push(\`<ellipse cx="\${cx}" cy="\${cy}" rx="\${rx}" ry="\${ry}" fill="\${esc(el.fill||'#ccc')}"/>\`);
    } else if (el.type === 'text') {
      const fw   = fontW[el.fontWeight] || '400';
      const fs   = el.fontSize || 14;
      const fill = esc(el.color || '#1C1917');
      const anchor = el.textAlign === 'center' ? 'middle' : el.textAlign === 'right' ? 'end' : 'start';
      const xPos = el.textAlign === 'center' ? el.x + (el.width||0)/2 : el.textAlign === 'right' ? el.x + (el.width||0) : el.x;
      const lines = String(el.content||'').split('\\n');
      const lh = (el.lineHeight || 1.3) * fs;
      lines.forEach((line, li) => {
        parts.push(\`<text x="\${xPos}" y="\${el.y + fs + li*lh}" font-size="\${fs}" font-weight="\${fw}" fill="\${fill}" font-family="Georgia,serif" text-anchor="\${anchor}">\${esc(line)}</text>\`);
      });
    }
  }
  parts.push('</svg>');
  return parts.join('');
}

if (pen) {
  const data = typeof pen === 'string' ? JSON.parse(pen) : pen;
  const screens = data.screens || [];
  const nav = document.getElementById('screenNav');
  const frame = document.getElementById('phoneFrame');
  function show(idx) {
    frame.innerHTML = renderScreen(screens[idx]);
    document.querySelectorAll('.screen-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  }
  screens.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='screen-btn'+(i===0?' active':'');
    btn.textContent=s.label||s.id;
    btn.onclick=()=>show(i);
    nav.appendChild(btn);
  });
  show(0);
} else {
  document.getElementById('phoneFrame').innerHTML='<div class="empty-state"><h3>No pen data</h3><p>EMBEDDED_PEN not found</p></div>';
}
</script>
