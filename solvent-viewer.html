<script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; color: #1C1814; font-family: 'Inter', sans-serif; min-height: 100vh; }
    .viewer-header { background: rgba(245,240,232,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(28,24,20,0.10); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .viewer-brand { font-size: 15px; font-weight: 700; font-family: 'Lora', serif; }
    .viewer-tag { font-size: 12px; color: rgba(28,24,20,0.45); margin-top: 2px; }
    .viewer-actions { display: flex; gap: 10px; }
    .viewer-btn { font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; background: #C85A2A; color: #fff; border: none; font-weight: 600; text-decoration: none; }
    .viewer-btn.ghost { background: transparent; color: #1C1814; border: 1.5px solid rgba(28,24,20,0.18); }
    .viewer-body { max-width: 960px; margin: 0 auto; padding: 36px 24px; }
    .screen-nav { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .nav-pill { padding: 8px 16px; border-radius: 99px; font-size: 13px; font-weight: 500; background: #FFFDF8; border: 1px solid rgba(28,24,20,0.12); cursor: pointer; color: #1C1814; transition: all 0.15s; }
    .nav-pill.active { background: #C85A2A; color: #fff; border-color: #C85A2A; }
    .screen-panel { display: none; animation: fadeIn 0.2s ease; }
    .screen-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .card-window { background: #FFFDF8; border: 1px solid rgba(28,24,20,0.10); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(28,24,20,0.08); margin-bottom: 20px; }
    .card-bar { background: #F5F0E8; border-bottom: 1px solid rgba(28,24,20,0.09); display: flex; align-items: center; padding: 0 16px; height: 36px; gap: 10px; }
    .card-id { font-size: 11px; color: rgba(28,24,20,0.40); font-family: monospace; }
    .card-title { flex: 1; text-align: center; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #1C1814; }
    .card-badge { font-size: 9px; background: rgba(46,125,82,0.10); color: #2E7D52; border: 1px solid rgba(46,125,82,0.20); padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    .wbody { padding: 22px; }
    pre { font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.7; color: rgba(28,24,20,0.65); background: #F5F0E8; border: 1px solid rgba(28,24,20,0.09); border-radius: 8px; padding: 14px; overflow-x: auto; white-space: pre-wrap; }
    h2 { font-family: 'Lora', serif; font-size: 19px; font-weight: 600; margin-bottom: 5px; }
    p { font-size: 13px; color: rgba(28,24,20,0.50); line-height: 1.65; margin-bottom: 14px; }
    .meta-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; margin-bottom: 18px; }
    .meta-pill { background: rgba(200,90,42,0.08); border: 1px solid rgba(200,90,42,0.20); border-radius: 5px; padding: 3px 9px; font-size: 11px; color: #C85A2A; font-family: monospace; }
  </style>
</head>
<body>
  <div class="viewer-header">
    <div><div class="viewer-brand">Solvent</div><div class="viewer-tag">Prototype Viewer · 5 screens</div></div>
    <div class="viewer-actions">
      <a href="/solvent-finance" class="viewer-btn ghost">← Hero</a>
      <a href="/solvent-finance-mock" class="viewer-btn">Interactive Mock ☀◑</a>
    </div>
  </div>
  <div class="viewer-body">
    <div class="screen-nav" id="screenNav"></div>
    <div id="screenPanels"></div>
  </div>
  <script>
    const pen = window.EMBEDDED_PEN ? JSON.parse(window.EMBEDDED_PEN) : null;
    if (pen) {
      const nav = document.getElementById('screenNav');
      const panels = document.getElementById('screenPanels');
      pen.screens.forEach((s, i) => {
        const pill = document.createElement('button');
        pill.className = 'nav-pill' + (i===0?' active':'');
        pill.textContent = s.label;
        pill.onclick = () => {
          document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
          document.querySelectorAll('.screen-panel').forEach(p=>p.classList.remove('active'));
          pill.classList.add('active');
          document.getElementById('panel-'+s.id).classList.add('active');
        };
        nav.appendChild(pill);
        const panel = document.createElement('div');
        panel.className = 'screen-panel' + (i===0?' active':'');
        panel.id = 'panel-'+s.id;
        panel.innerHTML = `
          <div class="card-window">
            <div class="card-bar">
              <span class="card-id">S-0${i+1}</span>
              <span class="card-title">${s.label} — Solvent</span>
              <span class="card-badge">LIGHT</span>
            </div>
            <div class="wbody">
              <h2>${s.label}</h2>
              <p>${s.description || ''}</p>
              <div class="meta-row">${(s.components||[]).map(c=>'<span class="meta-pill">'+c.type+'</span>').join('')}</div>
              <pre>${JSON.stringify(s.components, null, 2)}</pre>
            </div>
          </div>
        `;
        panels.appendChild(panel);
      });
    }
  </script>
</body>
</html>
