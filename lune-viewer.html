    .pen-card h2 { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .pen-card p { font-size: 13px; color: #9A8878; font-style: italic; font-family: 'Lora', serif; line-height: 1.6; margin-bottom: 12px; }
    .meta-pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; background: #EDE0D4; color: #9A8878; margin: 2px; border: 1px solid #DDD0C3; }

<script>window.__PEN_LOADED=true;</script>
  <script>
    const pen = window.EMBEDDED_PEN ? JSON.parse(window.EMBEDDED_PEN) : null;
    if (pen) {
      const nav = document.getElementById('screenNav');
      const panels = document.getElementById('screenPanels');
      pen.screens.forEach((s, i) => {
        const pill = document.createElement('button');
        pill.className = 'nav-pill' + (i === 0 ? ' active' : '');
        pill.textContent = s.name || s.label || s.id;
        pill.onclick = () => {
          document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
          document.querySelectorAll('.screen-panel').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          document.getElementById('panel-' + s.id).classList.add('active');
        };
        nav.appendChild(pill);
        const panel = document.createElement('div');
        panel.className = 'screen-panel' + (i === 0 ? ' active' : '');
        panel.id = 'panel-' + s.id;
        const root = s.root || {};
        const elems = root.children ? root.children.length : 0;
        panel.innerHTML = `
          <div class="pen-card">
            <h2>${s.name || s.id}</h2>
            <p>Screen ${i+1} of ${pen.screens.length} · ${elems} top-level elements · ${pen.width}×${pen.height}px</p>
            <div>${(root.children||[]).slice(0,8).map(c => '<span class="meta-pill">' + (c.type||'el') + (c.fill ? ' · ' + c.fill.slice(0,7) : '') + '</span>').join('')}</div>
          </div>
          <pre>${JSON.stringify(root, null, 2).slice(0, 3000)}${JSON.stringify(root).length > 3000 ? '\n...(truncated)' : ''}</pre>
        `;
        panels.appendChild(panel);
      });
    } else {
      document.getElementById('screenPanels').innerHTML = '<p style="color:#9A8878;padding:20px;font-style:italic;">No pen data embedded.</p>';
    }
  </script>
