  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#06070F;color:#E4E8F5;font-family:'Inter',sans-serif;min-height:100vh;}
    .viewer-header{background:rgba(6,7,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid #1C2238;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .viewer-brand{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:#E4E8F5;letter-spacing:-0.02em;}
    .viewer-brand span{color:#22D3A8;}
    .viewer-tag{font-family:'Space Mono',monospace;font-size:9px;color:#4A5370;margin-top:3px;letter-spacing:0.06em;}
    .viewer-actions{display:flex;gap:10px;}
    .viewer-btn{font-family:'Space Mono',monospace;font-size:10px;padding:7px 16px;border-radius:20px;cursor:pointer;background:#22D3A8;color:#06070F;border:none;font-weight:700;text-decoration:none;letter-spacing:0.04em;}
    .viewer-btn.ghost{background:transparent;color:#E4E8F5;border:1px solid #1C2238;}
    .viewer-body{max-width:1100px;margin:0 auto;padding:40px 28px;}
    .screens-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
    .screen-panel{background:#0D1020;border:1px solid #1C2238;border-radius:14px;overflow:hidden;width:200px;}
    .panel-header{background:#131728;padding:10px 14px;border-bottom:1px solid #1C2238;display:flex;align-items:center;gap:8px;}
    .panel-dot{width:7px;height:7px;border-radius:50%;background:#22D3A8;}
    .panel-title{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.06em;color:#E4E8F5;}
    .panel-body{padding:14px;}
    .panel-desc{font-size:11px;color:#4A5370;line-height:1.5;margin-bottom:10px;}
    .meta-pill{display:inline-block;font-size:8px;background:#131728;color:#4A5370;padding:2px 8px;border-radius:10px;margin:2px;border:1px solid #1C2238;}
    .hero-link{text-align:center;margin-bottom:24px;font-size:13px;color:#4A5370;}
    .hero-link a{color:#22D3A8;font-weight:500;text-decoration:none;font-family:'Space Mono',monospace;}
    .node-count{margin-top:8px;font-size:9px;color:#2A3050;font-family:'Space Mono',monospace;}
    .palette-strip{display:flex;gap:8px;justify-content:center;margin-bottom:28px;}
    .pal{width:28px;height:28px;border-radius:50%;border:1px solid #1C2238;}
    .pal-label{font-size:8px;color:#4A5370;text-align:center;margin-top:3px;font-family:'Space Mono',monospace;letter-spacing:0.02em;}
  </style>

  <script>
    const screenNames = ['Pulse','Incidents','Timeline','AI Brief','Team'];
    const screenDescs = [
      '12 circular pulse rings (3×4 grid), status summary strip, live AI insight chip.',
      'P1/P2/P3 incident cards with AI triage confidence scores and severity badges.',
      'Vertical 7-event timeline, root cause marker highlighted, AI callout box.',
      '4-section plain-language postmortem: what happened, root cause, resolution, AI suggestions.',
      'On-call banner, escalation ladder with circle step indicators, response metrics, next rotation.',
    ];
    const screenTags = [
      ['Pulse rings','Health grid','AI chip'],
      ['AI triage','P1/P2/P3','Confidence'],
      ['Timeline','Root cause','Events'],
      ['Postmortem','AI text','Space Mono'],
      ['On-call','Escalation','Metrics'],
    ];
    const dotColors = ['#22D3A8','#FF4560','#FF7B35','#A78BFA','#60A5FA'];
    const container = document.getElementById('screens');
    for (let i = 0; i < 5; i++) {
      const panel = document.createElement('div');
      panel.className = 'screen-panel';
      panel.innerHTML = '<div class="panel-header"><div class="panel-dot" style="background:' + dotColors[i] + '"></div><span class="panel-title">S' + (i+1) + ' — ' + screenNames[i].toUpperCase() + '</span></div>'
        + '<div class="panel-body"><div class="panel-desc">' + screenDescs[i] + '</div>'
        + '<div>' + screenTags[i].map(t => '<span class="meta-pill">' + t + '</span>').join('') + '</div></div>';
      container.appendChild(panel);
    }
    const pen = window.EMBEDDED_PEN ? JSON.parse(window.EMBEDDED_PEN) : null;
    if (pen) {
      const nodes = pen.children || [];
      document.querySelectorAll('.screen-panel').forEach((p, i) => {
        const count = nodes.filter(n => n.name && n.name.startsWith('s'+i+'-')).length;
        if (count > 0) {
          p.querySelector('.panel-body').insertAdjacentHTML('beforeend', '<div class="node-count">' + count + ' design nodes</div>');
        }
      });
    }
  </script>
