<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BALM — Prototype Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F6F1EB; --surface: #FFFFFF; --surface-alt: #EDE8DF;
      --text: #1A1410; --muted: rgba(26,20,16,0.45);
      --accent: #C04A12; --accent2: #3D7A56;
      --border: rgba(26,20,16,0.08); --border-strong: rgba(26,20,16,0.16);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
    .viewer-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .viewer-brand { font-family: 'Libre Baskerville', serif; font-size: 16px; font-weight: 700; letter-spacing: 0.08em; }
    .viewer-tag { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .viewer-actions { display: flex; gap: 10px; }
    .viewer-btn { font-size: 12px; padding: 7px 14px; border-radius: 6px; text-decoration: none; font-weight: 500; border: 1px solid var(--border-strong); color: var(--text); background: var(--surface); }
    .viewer-btn:not(.ghost) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .viewer-body { max-width: 900px; margin: 0 auto; padding: 32px; }
    .screen-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .nav-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted); }
    .nav-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .screen-panel { display: none; animation: fadeIn 0.2s ease; }
    .screen-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .balm-window { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 20px rgba(26,20,16,0.07); margin-bottom: 20px; }
    .balm-bar { background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 18px; height: 40px; gap: 10px; }
    .balm-id { font-size: 11px; color: var(--muted); }
    .balm-title { flex: 1; text-align: center; font-family: 'Libre Baskerville', serif; font-size: 13px; letter-spacing: 0.06em; color: var(--text); }
    .balm-theme { font-size: 10px; background: rgba(192,74,18,0.08); color: var(--accent); border: 1px solid rgba(192,74,18,0.20); padding: 2px 8px; border-radius: 3px; }
    .wbody { padding: 24px; }
    pre { font-family: 'Fira Code', monospace; font-size: 11.5px; line-height: 1.7; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; white-space: pre-wrap; }
    h2 { font-family: 'Libre Baskerville', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 14px; }
    .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; margin-bottom: 18px; }
    .meta-pill { background: rgba(192,74,18,0.07); border: 1px solid rgba(192,74,18,0.18); border-radius: 5px; padding: 4px 10px; font-size: 11px; color: var(--accent); }
    .meta-pill.sage { background: rgba(61,122,86,0.07); border-color: rgba(61,122,86,0.18); color: var(--accent2); }
  </style>
</head>
<body>
  <div class="viewer-header">

      <div class="viewer-brand">BALM</div>
      <div class="viewer-tag">Prototype Viewer · 5 screens</div>
    </div>
    <div class="viewer-actions">
      <a href="/balm" class="viewer-btn ghost">← Hero</a>
      <a href="/balm-mock" class="viewer-btn">Interactive Mock ☀◑</a>
    </div>
  </div>
  <div class="viewer-body">
    <div class="screen-nav" id="screenNav"></div>
    <div id="screenPanels"></div>
  </div>

<script>
  <script>
    const pen = window.EMBEDDED_PEN ? JSON.parse(window.EMBEDDED_PEN) : null;
    if (pen) {
      const nav = document.getElementById('screenNav');
      const panels = document.getElementById('screenPanels');
      pen.screens.forEach((s, i) => {
        const pill = document.createElement('button');
        pill.className = 'nav-pill' + (i===0?' active':'');
        pill.textContent = s.label;
        pill.onclick = () => {
          document.querySelectorAll('.nav-pill').forEach(p=>p.classList.remove('active'));
          document.querySelectorAll('.screen-panel').forEach(p=>p.classList.remove('active'));
          pill.classList.add('active');
          document.getElementById('panel-'+s.id).classList.add('active');
        };
        nav.appendChild(pill);
        const panel = document.createElement('div');
        panel.className = 'screen-panel' + (i===0?' active':'');
        panel.id = 'panel-'+s.id;
        const comps = (s.components||[]);
        const sageIds = ['nourish','trends','move'];
        panel.innerHTML = `
          <div class="balm-window">
            <div class="balm-bar">
              <span class="balm-id">S-0${i+1}</span>
              <span class="balm-title">${s.label} — BALM</span>
              <span class="balm-theme">LIGHT</span>
            </div>
            <div class="wbody">
              <h2>${s.label}</h2>
              <p>${s.description}</p>
              <div class="meta-row">${comps.map((c,j)=>'<span class="meta-pill'+(j%2===1?' sage':'')+'">' + c.type + '</span>').join('')}</div>
              <pre>${JSON.stringify(s.components, null, 2)}</pre>
            </div>
          </div>
        `;
        panels.appendChild(panel);
      });
    }
  </script>
</body>
</html>
